services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${TAILSCALE_IP:?set in .env}:4004
      PUID: 1000
      PGID: 1000
    ports:
      - "${TAILSCALE_IP:?set in .env}:4004:3000"
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
