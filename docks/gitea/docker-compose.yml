services:
  gitea:
    image: docker.gitea.com/gitea:1.25.4
    container_name: gitea
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: ${TAILSCALE_IP:?set in .env}
      GITEA__server__ROOT_URL: http://${TAILSCALE_IP:?set in .env}:4044/
      GITEA__server__SSH_DOMAIN: ${TAILSCALE_IP:?set in .env}
      GITEA__server__SSH_PORT: 4022
      GITEA__server__START_SSH_SERVER: "false"
    ports:
      - "${TAILSCALE_IP:?set in .env}:4044:3000"
      - "${TAILSCALE_IP:?set in .env}:4022:22"
    volumes:
      - ./gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
